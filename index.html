<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAS: Algeria Unconventional Resources Acceleration Summit – Coming Soon</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #0b0f14, #020305);
            color: #ffffff;
            font-family: "Segoe UI", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            padding: 20px;
        }

        .logo {
            width: 80%;              /* scales with screen */
            max-width: 900px;        /* much larger cap */
            margin-bottom: 50px;
            filter: drop-shadow(0 0 30px rgba(0, 150, 0, 0.5));
        }

        h1 {
            font-size: 56px;
            margin: 0;
            font-weight: 700;
        }

        .coming-soon {
            font-size: 48px;
            margin-top: 10px;
            color: #00c853;
        }

        .subtitle {
            margin-top: 25px;
            font-size: 20px;
            color: #cccccc;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #777;
        }

        @media (max-width: 768px) {
            .logo {
                width: 95%;
                max-width: 500px;
            }

            h1 {
                font-size: 36px;
            }

            .coming-soon {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    
    <img src="auras-dark-logo.png" alt="AURAS Logo" class="logo">

    <h1>Under Construction</h1>
    <div class="coming-soon">Coming Soon</div>

    <div class="subtitle">
        AURAS – Algeria Unconventional Resources Acceleration Summit
    </div>

    <div class="footer">
        © 2026 AURAS. All rights reserved.
    </div>

</div>

</body>
</html>
